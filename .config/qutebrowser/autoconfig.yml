# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/master/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  auto_save.session:
    global: false
  content.blocking.method:
    global: both
  content.geolocation:
    https://www.google.com: true
  content.headers.accept_language:
    global: en-US,en;q=0.5
  content.headers.custom:
    global:
      accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
  content.javascript.can_access_clipboard:
    global: true
  content.notifications.enabled:
    https://mail.google.com: true
    https://thebox.sudacode.com: true
    https://www.netflix.com: true
    https://www.reddit.com: true
    https://www.youtube.com: true
  content.register_protocol_handler:
    https://mail.google.com?extsrc=mailto&url=%25s: true
    https://outlook.office.com?mailtouri=%25s: true
  editor.command:
    global:
    - vim
    - '{}'
  scrolling.smooth:
    global: true
  url.default_page:
    global: https://startpage.sudacode.com
  url.searchengines:
    global:
      DEFAULT: https://google.com/search?q={}
  url.start_pages:
    global: https://dash.sudacode.com
