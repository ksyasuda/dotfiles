set -g default-terminal "screen-256color"
source "/usr/share/powerline/bindings/tmux/powerline.conf"

#set -g pane-border-format '#(sh ~/.config/functions/pane-border-format.sh \
  --pane-current-path=#{pane_current_path} \
  --pane-active=#{pane_active})'

#set-option -g status on
#set-option -g status-interval 2
#set-option -g status-justify "centre"
#set-option -g status-left-length 60
#set-option -g status-right-length 90
#set-option -g status-left "#(~/.config/tmux-powerline/powerline.sh left)"
#set-option -g status-right "#(~/.config/tmux-powerline/powerline.sh right)"

#List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# .... maybe more plugins here

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
